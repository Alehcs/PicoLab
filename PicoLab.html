<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PicoLab — Visual STEM Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #F7F8F4;
      color: #263238;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ─── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4D9CF; border-radius: 3px; }

    /* ─── App shell ───────────────────────────────────────────── */
    .p-app { display: flex; height: 100vh; overflow: hidden; }
    .p-sidebar {
      width: 222px; flex-shrink: 0;
      border-right: 1.5px solid #E1E6DB;
      background: #FFFFFF;
      display: flex; flex-direction: column;
      height: 100vh; overflow-y: auto;
      padding: 18px 10px;
    }
    .p-content { flex: 1; overflow: hidden; display: flex; height: 100vh; }

    /* ─── Navigation ──────────────────────────────────────────── */
    .p-nav {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 12px; border-radius: 10px;
      cursor: pointer; color: #5F6468;
      font-size: 13.5px; font-weight: 500;
      transition: background 0.12s, color 0.12s;
      user-select: none; white-space: nowrap;
    }
    .p-nav:hover { background: #F1F3ED; color: #263238; }
    .p-nav.active { background: #EAF4FF; color: #4A90E2; font-weight: 600; }
    .p-nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #B0B8AE; padding: 8px 12px 4px; }

    /* ─── Buttons ─────────────────────────────────────────────── */
    .p-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px; border-radius: 11px;
      font-size: 13.5px; font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; border: none;
      transition: all 0.14s; outline: none; white-space: nowrap;
    }
    .p-btn-primary { background: #4A90E2; color: white; }
    .p-btn-primary:hover { background: #3A7FD0; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(74,144,226,0.30); }
    .p-btn-secondary { background: white; color: #5F6468; border: 1.5px solid #E1E6DB; }
    .p-btn-secondary:hover { background: #F7F8F4; color: #263238; border-color: #C5CEC0; }
    .p-btn-ghost { background: transparent; color: #5F6468; padding: 7px 13px; border-radius: 9px; }
    .p-btn-ghost:hover { background: #F1F3ED; color: #263238; }
    .p-btn-green { background: #5FBF8F; color: white; }
    .p-btn-green:hover { background: #4DAF7F; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(95,191,143,0.28); }
    .p-btn-coral { background: #FFF1F1; color: #C04040; border: 1.5px solid #FDDADA; }
    .p-btn-coral:hover { background: #FFE6E6; }
    .p-btn-yellow { background: #FFF6DC; color: #8A6018; border: 1.5px solid #FDEEBA; }
    .p-btn-yellow:hover { background: #FFEFCA; }
    .p-btn-sm { padding: 6px 13px; font-size: 12.5px; border-radius: 9px; }
    .p-btn-xs { padding: 4px 10px; font-size: 12px; border-radius: 8px; }

    /* ─── Cards ───────────────────────────────────────────────── */
    .p-card { background: white; border: 1.5px solid #E1E6DB; border-radius: 18px; }
    .p-card-soft { background: #F1F3ED; border-radius: 14px; }
    .p-card-signal { background: #FFF1F1; border: 1.5px solid #FDDADA; border-radius: 16px; }
    .p-card-hint { background: #FFF6DC; border: 1.5px solid #FDEEBA; border-radius: 14px; }
    .p-card-progress { background: #EAF7EF; border: 1.5px solid #C0E8D0; border-radius: 14px; }
    .p-card-blue { background: #EAF4FF; border: 1.5px solid #B8D8F4; border-radius: 14px; }

    /* ─── Badges ──────────────────────────────────────────────── */
    .p-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }
    .p-badge-blue   { background: #EAF4FF; color: #2770C2; }
    .p-badge-green  { background: #EAF7EF; color: #2A7850; }
    .p-badge-coral  { background: #FFF1F1; color: #BF3A3A; }
    .p-badge-yellow { background: #FFF6DC; color: #886018; }
    .p-badge-grey   { background: #F1F3ED; color: #5F6468; }

    /* ─── Tabs ────────────────────────────────────────────────── */
    .p-tab { padding: 7px 16px; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; color: #5F6468; transition: all 0.12s; border: none; background: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
    .p-tab:hover { background: #F1F3ED; color: #263238; }
    .p-tab.active { background: #EAF4FF; color: #4A90E2; font-weight: 600; }

    /* ─── Inputs ──────────────────────────────────────────────── */
    .p-input { width: 100%; padding: 11px 15px; border: 1.5px solid #E1E6DB; border-radius: 12px; font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif; color: #263238; background: #FAFBF8; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .p-input:focus { border-color: #4A90E2; background: white; box-shadow: 0 0 0 3px rgba(74,144,226,0.10); }
    textarea.p-input { resize: vertical; min-height: 90px; line-height: 1.65; }

    /* ─── Range slider ────────────────────────────────────────── */
    .p-range { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: #E1E6DB; outline: none; cursor: pointer; }
    .p-range::-webkit-slider-thumb { -webkit-appearance: none; width: 17px; height: 17px; border-radius: 50%; background: #4A90E2; cursor: pointer; box-shadow: 0 1px 4px rgba(74,144,226,0.35); border: 2.5px solid white; }
    .p-range::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #4A90E2; cursor: pointer; border: 2px solid white; }

    /* ─── Chips ───────────────────────────────────────────────── */
    .p-chip { display: inline-flex; align-items: center; padding: 5px 13px; border-radius: 20px; font-size: 12.5px; font-weight: 500; cursor: pointer; border: 1.5px solid #E1E6DB; background: white; color: #5F6468; transition: all 0.12s; user-select: none; }
    .p-chip:hover, .p-chip.sel { background: #EAF4FF; border-color: #A8C8EC; color: #3A7ACC; }

    /* ─── Upload zone ─────────────────────────────────────────── */
    .p-upload { border: 2px dashed #D4D9CF; border-radius: 18px; background: #FAFBF8; text-align: center; padding: 48px 32px; cursor: pointer; transition: all 0.15s; }
    .p-upload:hover { border-color: #4A90E2; background: #F0F7FF; }

    /* ─── Formula toolbar ─────────────────────────────────────── */
    .p-toolbar-btn { padding: 5px 10px; border-radius: 7px; font-size: 13px; font-family: 'JetBrains Mono', monospace; border: 1.5px solid #E1E6DB; background: white; color: #263238; cursor: pointer; transition: all 0.12s; }
    .p-toolbar-btn:hover { background: #EAF4FF; border-color: #A8C8EC; color: #4A90E2; }

    /* ─── Answer options ──────────────────────────────────────── */
    .p-opt { padding: 12px 18px; border: 2px solid #E1E6DB; border-radius: 12px; cursor: pointer; font-size: 14.5px; font-family: 'JetBrains Mono', monospace; transition: all 0.14s; background: white; font-weight: 500; }
    .p-opt:hover { border-color: #4A90E2; background: #EAF4FF; }
    .p-opt.correct { border-color: #5FBF8F; background: #EAF7EF; color: #257550; }
    .p-opt.wrong   { border-color: #F47C7C; background: #FFF1F1; color: #BF3A3A; }

    /* ─── Panels ──────────────────────────────────────────────── */
    .p-rpanel { width: 224px; flex-shrink: 0; border-left: 1.5px solid #E1E6DB; background: white; height: 100%; overflow-y: auto; padding: 22px 16px; display: flex; flex-direction: column; gap: 18px; }
    .p-lpanel { width: 204px; flex-shrink: 0; border-right: 1.5px solid #E1E6DB; background: white; height: 100%; overflow-y: auto; padding: 22px 16px; display: flex; flex-direction: column; gap: 14px; }
    .p-scroll  { flex: 1; overflow-y: auto; }

    /* ─── Step cards ──────────────────────────────────────────── */
    .p-step { background: white; border: 1.5px solid #E1E6DB; border-radius: 16px; overflow: hidden; }
    .p-step-hd { padding: 12px 18px; border-bottom: 1px solid #F1F3ED; display: flex; align-items: center; gap: 10px; }
    .p-step-bd { padding: 14px 18px; }
    .p-step-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }

    /* ─── Roadmap ─────────────────────────────────────────────── */
    .p-road-item { display: flex; gap: 14px; }
    .p-road-spine { display: flex; flex-direction: column; align-items: center; }
    .p-road-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .p-road-line { width: 2px; flex: 1; min-height: 16px; margin: 4px 0; }

    /* ─── Divider ─────────────────────────────────────────────── */
    .p-divider { height: 1px; background: #E1E6DB; margin: 6px 2px; }
    .p-section-lbl { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8A9188; }

    /* ─── Formula ─────────────────────────────────────────────── */
    .p-mono { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.01em; }

    /* ─── Progress bar ────────────────────────────────────────── */
    .p-pbar-track { height: 5px; border-radius: 3px; background: #E1E6DB; overflow: hidden; }
    .p-pbar-fill  { height: 100%; border-radius: 3px; background: #5FBF8F; transition: width 0.5s ease; }

    /* ─── Value tag ───────────────────────────────────────────── */
    .p-vtag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; background: #F1F3ED; border-radius: 7px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #263238; white-space: nowrap; }

    /* ─── Pico eye blink ──────────────────────────────────────── */
    @keyframes picoBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      94%, 97%      { transform: scaleY(0.06); }
    }
    .pico-eye { animation: picoBlink 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }

    /* ─── Scan highlight ──────────────────────────────────────── */
    .p-scan-hl { position: absolute; border: 2px solid #4A90E2; border-radius: 4px; background: rgba(74,144,226,0.08); cursor: pointer; transition: background 0.15s; }
    .p-scan-hl:hover { background: rgba(74,144,226,0.18); }

    /* ─── Animations ──────────────────────────────────────────── */
    .p-fade { animation: pfade 0.2s ease-out; }
    @keyframes pfade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
